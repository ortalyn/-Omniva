<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
  // Firebase Configuration (YOUR PROJECT)
  const firebaseConfig = {
    apiKey: "AIzaSyBvyvCUMbOVB0tsobsvImVDVeD7Ar6MK7Y",
    authDomain: "saas-portal-30302.firebaseapp.com",
    databaseURL: "https://saas-portal-30302-default-rtdb.firebaseio.com/",
    projectId: "saas-portal-30302",
    storageBucket: "saas-portal-30302.appspot.com",
    messagingSenderId: "319885619114",
    appId: "1:319885619114:web:2ddaa487fca89ff26145d3"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // SUBMIT APPLICATION FUNCTION
  function submitApplication() {

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let country = document.getElementById("country").value;

    if (!name || !email || !country) {
      alert("Please complete all fields");
      return;
    }

    // Generate Application ID
    let appId = "APP-" + Math.random().toString(36).substring(2, 8).toUpperCase();

    // Save to Firebase
    db.ref("applications").push({
      name: name,
      email: email,
      country: country,
      status: "Pending",
      appId: appId,
      time: new Date().toISOString()
    });

    // Show result on screen
    document.getElementById("status").innerText =
      "Application Submitted ✔ ID: " + appId;

    // Show admin/support section (if you have it)
    let links = document.getElementById("links");
    if (links) {
      links.style.display = "block";
    }
  }
</script>
