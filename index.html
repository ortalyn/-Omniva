<script>
function submitApplication() {

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let country = document.getElementById("country").value;

  if(!name || !email || !country){
    alert("Please complete all application fields");
    return;
  }

  // STEP 1: show processing message
  document.getElementById("token").innerText =
    "Submitting application... please wait";

  // STEP 2: simulate review delay (premium feel)
  setTimeout(() => {

    let token = "APP-" + Math.random().toString(36).substring(2,8).toUpperCase();

    document.getElementById("token").innerText =
      "Application Reviewed ✔ " + name + " | Verification Token: " + token;

  }, 4000); // 4 second delay

}
</script>
